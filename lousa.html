<!doctype html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lousa &mdash; Forma&ccedil;&atilde;o Dev</title>
    <meta name="description" content="Lousa interativa para aulas com desenho, texto, exportacao e impressao.">
    <meta name="theme-color" content="#0b1018">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="lousa.css">
  </head>
  <body class="whiteboard" data-board-theme="dark">
    <div class="board-app">
      <header class="toolbar" role="toolbar" aria-label="Ferramentas da lousa">
        <div class="toolbar-inner">
          <div class="toolbar-group brand-group">
            <a class="brand" href="index.html">Forma&ccedil;&atilde;o Dev</a>
            <span class="brand-divider" aria-hidden="true"></span>
            <span class="page-title">Lousa</span>
          </div>

          <div class="toolbar-group tools-group" role="group" aria-label="Ferramentas">
            <button class="tool-btn" type="button" data-tool="pen" aria-pressed="true">Caneta</button>
            <button class="tool-btn" type="button" data-tool="highlighter" aria-pressed="false">Marca</button>
            <button class="tool-btn" type="button" data-tool="eraser" aria-pressed="false">Borracha</button>
            <button class="tool-btn" type="button" data-tool="text" aria-pressed="false">Texto</button>
          </div>

          <div class="toolbar-group colors-group" role="group" aria-label="Cores">
            <span class="group-label">Cor</span>
            <div class="swatch-row" role="list">
              <button class="swatch" type="button" data-color="#f8fafc" aria-label="Cor gelo" role="listitem"></button>
              <button class="swatch" type="button" data-color="#22d3ee" aria-label="Cor ciano" role="listitem"></button>
              <button class="swatch" type="button" data-color="#38bdf8" aria-label="Cor azul" role="listitem"></button>
              <button class="swatch" type="button" data-color="#a3e635" aria-label="Cor lima" role="listitem"></button>
              <button class="swatch" type="button" data-color="#fbbf24" aria-label="Cor ambar" role="listitem"></button>
              <button class="swatch" type="button" data-color="#f97316" aria-label="Cor laranja" role="listitem"></button>
              <button class="swatch" type="button" data-color="#f472b6" aria-label="Cor rosa" role="listitem"></button>
              <button class="swatch" type="button" data-color="#0f172a" aria-label="Cor grafite" role="listitem"></button>
            </div>
            <label class="color-picker" for="color-picker" aria-label="Cor personalizada">
              <input id="color-picker" type="color" value="#22d3ee">
              <span aria-hidden="true">+</span>
            </label>
          </div>

          <div class="toolbar-group control-group" role="group" aria-label="Tamanho do pincel">
            <div class="control-block">
              <label for="size-range">Tamanho</label>
              <div class="control-row">
                <input id="size-range" type="range" min="2" max="48" step="1" value="12">
                <output id="size-value" for="size-range">12</output>
              </div>
            </div>
          </div>

          <div class="toolbar-group control-group" role="group" aria-label="Opacidade do marcador">
            <div class="control-block">
              <label for="opacity-range">Opacidade</label>
              <div class="control-row">
                <input id="opacity-range" type="range" min="0.1" max="0.8" step="0.05" value="0.35">
                <output id="opacity-value" for="opacity-range">35%</output>
              </div>
            </div>
          </div>

          <div class="toolbar-group control-group zoom-group" role="group" aria-label="Zoom">
            <div class="control-block">
              <label for="zoom-range">Zoom</label>
              <div class="control-row">
                <button class="icon-btn" type="button" data-action="zoom-out" aria-label="Diminuir zoom">-</button>
                <input id="zoom-range" type="range" min="0.5" max="2.5" step="0.1" value="1">
                <button class="icon-btn" type="button" data-action="zoom-in" aria-label="Aumentar zoom">+</button>
                <output id="zoom-value" for="zoom-range">100%</output>
                <button class="action-btn ghost" type="button" data-action="zoom-reset">Reset</button>
              </div>
            </div>
          </div>

          <div class="toolbar-group action-group" role="group" aria-label="Acoes principais">
            <button class="action-btn" type="button" data-action="undo" aria-label="Desfazer (Ctrl+Z)">Desfazer</button>
            <button class="action-btn" type="button" data-action="redo" aria-label="Refazer (Ctrl+Y)">Refazer</button>
            <button class="action-btn" type="button" data-action="clear">Limpar</button>
          </div>

          <div class="toolbar-group action-group" role="group" aria-label="Salvar e carregar">
            <button class="action-btn" type="button" data-action="save" aria-label="Salvar (Ctrl+S)">Salvar</button>
            <button class="action-btn" type="button" data-action="load">Carregar</button>
          </div>

          <div class="toolbar-group action-group" role="group" aria-label="Exportar">
            <button class="action-btn" type="button" data-action="download">Baixar PNG</button>
            <button class="action-btn" type="button" data-action="print">Imprimir</button>
            <button class="action-btn" type="button" data-action="export-json">Exportar JSON</button>
            <button class="action-btn" type="button" data-action="import-json">Importar JSON</button>
            <input id="import-file" type="file" accept="application/json" hidden>
          </div>

          <div class="toolbar-group toggle-group" role="group" aria-label="Exibicao">
            <button class="toggle-btn" type="button" data-toggle="grid" aria-pressed="true">Grade</button>
            <button class="toggle-btn" type="button" data-toggle="theme" aria-pressed="false">Fundo escuro</button>
          </div>
        </div>
      </header>

      <main class="board-main">
        <div class="board-surface show-grid" id="board-surface" data-tool="pen">
          <canvas id="board-canvas" aria-label="Area de desenho"></canvas>
        </div>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <div class="dialog-backdrop" id="text-dialog" role="dialog" aria-modal="true" aria-labelledby="text-dialog-title" hidden>
      <div class="dialog">
        <div class="dialog-header">
          <h2 id="text-dialog-title">Inserir texto</h2>
          <button class="icon-btn" type="button" data-action="close-text" aria-label="Fechar">&times;</button>
        </div>
        <p class="dialog-hint">Digite o texto e confirme. Tamanho e cor seguem a barra.</p>
        <textarea id="text-input" rows="4" placeholder="Digite aqui..."></textarea>
        <div class="dialog-actions">
          <button class="action-btn ghost" type="button" data-action="cancel-text">Cancelar</button>
          <button class="action-btn" type="button" data-action="confirm-text">Inserir</button>
        </div>
      </div>
    </div>

    <script src="lousa.js"></script>
  </body>
</html>
